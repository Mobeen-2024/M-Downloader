<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 180px;
      font-family: 'Segoe UI', Inter, system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0;
      padding: 0;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .brand-name {
      font-weight: 700;
      font-size: 15px;
      background: linear-gradient(135deg, #667eea, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .version {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
      padding: 2px 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 4px;
    }

    /* ── Toggle Row ──────────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
    }

    /* Sleek toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:checked + .slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
      background: #fff;
    }

    /* ── Status Area ─────────────────────────────────────────────────── */
    .status-area {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.inactive {
      background: #e74c3c;
      box-shadow: 0 0 6px rgba(231, 76, 60, 0.4);
      animation: none;
    }

    .status-dot.warning {
      background: #f39c12;
      box-shadow: 0 0 6px rgba(243, 156, 18, 0.4);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
    }

    .status-text.active { color: #2ecc71; }
    .status-text.inactive { color: #e74c3c; }

    .capture-count {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }

    /* ── Info Footer ─────────────────────────────────────────────────── */
    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-text {
      font-size: 10.5px;
      color: rgba(255,255,255,0.3);
      line-height: 1.4;
    }

    .footer-icon {
      font-size: 12px;
      opacity: 0.3;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">M</div>
      <span class="brand-name">Mdownloader</span>
    </div>
    <span class="version">v1.1.0</span>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <span class="toggle-label">Link Capture</span>
    <label class="switch">
      <input type="checkbox" id="toggle-capture" checked>
      <span class="slider"></span>
    </label>
  </div>

  <!-- Status -->
  <div class="status-area">
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text active" id="status-text">Active</span>
    </div>
    <div class="capture-count" id="capture-count">Monitoring downloads...</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-icon">⚡</span>
    <span class="footer-text">Downloads matching common file types (.exe, .zip, .iso, etc.) will be automatically captured.</span>
  </div>

  <script>
    const toggle  = document.getElementById("toggle-capture");
    const dot     = document.getElementById("status-dot");
    const text    = document.getElementById("status-text");
    const counter = document.getElementById("capture-count");

    // Load persisted state.
    chrome.storage.local.get(["mdownloader_enabled", "mdownloader_capture_count"], (result) => {
      const enabled = result.mdownloader_enabled !== undefined ? result.mdownloader_enabled : true;
      toggle.checked = enabled;
      updateUI(enabled);

      const count = result.mdownloader_capture_count || 0;
      if (count > 0) {
        counter.textContent = `${count} download${count !== 1 ? 's' : ''} captured this session.`;
      }
    });

    toggle.addEventListener("change", () => {
      const enabled = toggle.checked;
      chrome.storage.local.set({ mdownloader_enabled: enabled });
      updateUI(enabled);
    });

    function updateUI(enabled) {
      if (enabled) {
        dot.className = "status-dot";
        text.textContent = "Active";
        text.className = "status-text active";
        counter.textContent = "Monitoring downloads...";
      } else {
        dot.className = "status-dot inactive";
        text.textContent = "Disabled";
        text.className = "status-text inactive";
        counter.textContent = "Link capture is paused.";
      }
    }
  </script>
</body>
</html>
